# FinSecure Banking System - Application Properties

# Server Configuration
server.port=8080
server.servlet.context-path=/api
server.ssl.enabled=true
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=finsecure123
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=finsecure

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/finsecure_db?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Root@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Alternative PostgreSQL Configuration (uncomment to use)
# spring.datasource.url=jdbc:postgresql://localhost:5432/finsecure_db
# spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
# For PostgreSQL: org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# JWT Configuration
jwt.secret=k5nE5evDYqgVV+imbL7+oa6XJRTHxKFpLAeCzc6q4JY=
jwt.expiration=86400000
jwt.refresh.expiration=604800000

# Email Configuration (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=noreply@finsecure.com
spring.mail.password=your_app_password_here
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# OTP Configuration
otp.length=6
otp.expiry.minutes=10
otp.max.attempts=3

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload.dir=/var/finsecure/uploads/kyc

# Logging Configuration
logging.level.root=INFO
logging.level.com.finsecure=DEBUG
logging.level.org.springframework.security=DEBUG
logging.file.name=logs/finsecure.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Security Configuration
security.enable-csrf=true
security.cors.allowed-origins=https://localhost:3000,https://localhost:3001
security.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
security.cors.allowed-headers=*
security.cors.allow-credentials=true

# Application Configuration
app.name=FinSecure Banking System
app.version=1.0.0
app.frontend.customer-portal=https://localhost:3000
app.frontend.employee-portal=https://localhost:3001

# Transaction Limits
transaction.daily.limit.student=50000
transaction.daily.limit.adult=500000
transaction.daily.limit.minor=10000
transaction.per.transaction.limit=100000

# Session Management
server.servlet.session.timeout=30m
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict
